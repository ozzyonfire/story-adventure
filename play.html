<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Adventure</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/player.ts"></script>
  </head>
  <body class="player-page">
    <div class="outerContainer" id="outer-container">
      <div class="header" id="story-header">
        <h1 id="story-title">Loading...</h1>
        <h2 class="byline" id="story-byline"></h2>
        <div id="controls" class="buttons">
          <a href="/index.html" id="back-link">back</a>
          <a id="rewind" title="Restart story from beginning">restart</a>
          <a id="save" title="Save progress">save</a>
          <a id="reload" title="Reload from save point">load</a>
          <a id="theme-switch" title="Switch theme">theme</a>
        </div>
      </div>

      <div id="story" class="container"></div>
      <p id="player-error" class="error-state" hidden></p>
    </div>
  </body>
</html>
